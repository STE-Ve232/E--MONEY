version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: emoney
      POSTGRES_USER: emc
      POSTGRES_PASSWORD: emcpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: .
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app

  celery:
    build: .
    command: celery -A tasks.celery_app.celery worker --loglevel=info
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - postgres

volumes:
  pgdata: