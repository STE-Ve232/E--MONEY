<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Money Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  </head>
  <body>
    <div class="app-container">
      <nav class="sidebar">
        <div class="sidebar-header">
          <span class="logo">E-Money</span>
        </div>
        <ul class="sidebar-menu">
          <li><a href="#" data-target="transactions">Transactions</a></li>
          <li><a href="#" class="active" data-target="banks">My Banks</a></li>
          <li><a href="#" data-target="cards">My Cards</a></li>
          <li><a href="#" data-target="send">Send Money</a></li>
        </ul>
      </nav>
      <main class="main-content">
        <header class="main-header">
          <div class="balance-display">
            <h2>Total Balance</h2>
            <span class="balance-amount">$0.00</span>
          </div>
          <div class="user-profile">
            <span>Welcome!</span>
          </div>
        </header>
        <div class="content-area">
          <!-- Dynamic content will be injected here by script.js -->
        </div>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
